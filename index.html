<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tlgrami | Telegram Web K</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0e1621; color: #fff; }
    .bg-sidebar { background-color: #17212b; }
    .bg-chat { background-color: #0e1621; }
    .bg-bubble-me { background-color: #2b5278; }
    .bg-bubble-them { background-color: #182533; }
    .text-accent { color: #2481cc; }
    .bg-accent { background-color: #2481cc; }
    
    .bubble-tail { position: absolute; bottom: 0; width: 10px; height: 10px; }
    .bubble-tail-me { left: -8px; fill: #2b5278; transform: scaleX(-1); }
    .bubble-tail-them { right: -8px; fill: #182533; transform: scaleX(-1); }
    
    @keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .typing-dot { animation: typing 1s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 10px; }
  </style>
</head>
<body class="h-screen flex overflow-hidden">

  <!-- Pane 1: Navigation (70px) -->
  <nav class="w-[70px] bg-sidebar border-l border-[#0e1621] flex flex-col items-center py-4 gap-6">
    <div class="w-12 h-12 bg-accent rounded-full flex items-center justify-center cursor-pointer shadow-lg">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </div>
    <div id="login-btn" class="mt-auto mb-4 w-10 h-10 rounded-full bg-white/10 flex items-center justify-center cursor-pointer hover:bg-white/20 transition-all">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
    </div>
  </nav>

  <!-- Pane 2: Discovery (350px) -->
  <aside class="w-[350px] bg-sidebar border-l border-[#0e1621] flex flex-col">
    <div class="p-4">
      <input type="text" placeholder="بحث" class="w-full bg-chat border-none rounded-xl py-2 px-4 text-sm outline-none">
    </div>
    <div id="chat-list" class="flex-1 overflow-y-auto">
      <div class="flex items-center gap-3 p-3 bg-accent cursor-pointer">
        <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center font-bold">G</div>
        <div class="flex-1 min-w-0">
          <h3 class="font-medium truncate">المحادثة العامة</h3>
          <p class="text-sm text-white/70 truncate">مرحباً بك في tlgrami!</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Pane 3: Conversation (Fluid) -->
  <main class="flex-1 flex flex-col bg-chat relative">
    <header class="h-16 bg-sidebar border-b border-[#0e1621] flex items-center px-6 justify-between z-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-accent flex items-center justify-center font-bold">G</div>
        <div>
          <h2 class="font-bold text-[15px]">المحادثة العامة</h2>
          <p id="typing-status" class="text-xs text-accent hidden">يكتب الآن<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span></p>
        </div>
      </div>
      <div id="admin-controls" class="hidden flex gap-2">
        <button id="nuke-btn" class="bg-red-500/20 text-red-500 text-[10px] font-bold px-3 py-1 rounded-full border border-red-500/50">حذف الكل</button>
        <button id="broadcast-btn" class="bg-accent/20 text-accent text-[10px] font-bold px-3 py-1 rounded-full border border-accent/50">بث رسالة</button>
      </div>
    </header>

    <div id="messages-container" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4"></div>

    <footer class="p-4 bg-chat">
      <div class="max-w-4xl mx-auto flex items-end gap-3">
        <div class="flex-1 bg-sidebar rounded-2xl p-2 flex items-end gap-2 border border-[#0e1621]">
          <label class="p-2 cursor-pointer hover:text-accent">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <input type="file" id="media-input" class="hidden" accept="image/*,video/*">
          </label>
          <textarea id="msg-input" placeholder="رسالة" class="flex-1 bg-transparent border-none outline-none py-2 text-sm resize-none" rows="1"></textarea>
        </div>
        <button id="send-btn" class="w-12 h-12 bg-accent rounded-full flex items-center justify-center shadow-lg">
          <svg class="w-6 h-6 text-white rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
        </button>
      </div>
    </footer>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
