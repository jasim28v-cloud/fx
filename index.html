<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>tlgrami — Telegram Web K Clone</title>
    <!-- Tailwind CSS 3.4 + Font Awesome 6 + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Custom CSS (Glassmorph, Bubbles, Animations) -->
    <link rel="stylesheet" href="styles.css">
    <!-- PWA Manifest + Service Worker registration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0e1621">
</head>
<body class="bg-[#0e1621] text-white font-[Inter] overflow-hidden h-screen">
    <!-- 3-PANE ARCHITECTURE -->
    <div class="flex h-full w-full">
        <!-- COLUMN 1: FOLDERS (70px fixed) -->
        <div id="foldersColumn" class="w-[70px] bg-[#17212b] flex flex-col items-center py-4 gap-6 border-r border-white/5 z-20">
            <div class="folder-icon active" data-folder="all"><i class="fas fa-home text-2xl"></i><span class="text-[10px] mt-1">All</span></div>
            <div class="folder-icon" data-folder="personal"><i class="fas fa-user text-2xl"></i><span class="text-[10px] mt-1">Personal</span></div>
            <div class="folder-icon" data-folder="channels"><i class="fas fa-broadcast-tower text-2xl"></i><span class="text-[10px] mt-1">Channels</span></div>
            <div class="folder-icon" data-folder="muted"><i class="fas fa-bell-slash text-2xl"></i><span class="text-[10px] mt-1">Muted</span></div>
            <div class="folder-icon admin-folder hidden" data-folder="admin"><i class="fas fa-crown text-2xl text-yellow-500"></i><span class="text-[10px] mt-1">Admin</span></div>
        </div>

        <!-- COLUMN 2: CHAT LIST (350px) -->
        <div id="chatListColumn" class="w-[350px] bg-[#17212b] flex flex-col border-r border-white/5">
            <div class="p-3 flex items-center gap-3 border-b border-white/10">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="searchChats" placeholder="Search chats (regex)..." class="w-full bg-[#242f3e] rounded-full py-2 pl-9 pr-4 text-sm outline-none focus:ring-1 focus:ring-[#2481cc]">
                </div>
                <button id="newChatBtn" class="bg-[#2481cc] w-9 h-9 rounded-full flex items-center justify-center"><i class="fas fa-plus"></i></button>
            </div>
            <div id="chatListContainer" class="flex-1 overflow-y-auto custom-scrollbar"></div>
        </div>

        <!-- COLUMN 3: CHAT WINDOW -->
        <div id="chatWindow" class="flex-1 flex flex-col relative bg-[#080d14] bg-chat-pattern">
            <!-- Sticky header -->
            <div id="chatHeader" class="sticky top-0 bg-[#17212b]/90 backdrop-blur-md border-b border-white/10 px-5 py-3 flex items-center justify-between z-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#2481cc] flex items-center justify-center font-bold text-lg">U</div>
                    <div>
                        <h2 id="chatTitle" class="font-semibold text-lg">Select a chat</h2>
                        <p id="chatStatus" class="text-xs text-gray-400">Online · last seen recently</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <i class="fas fa-phone-alt text-gray-300 cursor-pointer hover:text-[#2481cc]"></i>
                    <i class="fas fa-info-circle text-gray-300 cursor-pointer hover:text-[#2481cc]"></i>
                </div>
            </div>
            <!-- Messages container -->
            <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 custom-scrollbar" style="padding-bottom: 80px;"></div>
            <!-- Scroll-to-bottom button -->
            <button id="scrollToBottomBtn" class="absolute bottom-24 right-6 bg-[#2481cc] rounded-full w-10 h-10 shadow-lg hidden items-center justify-center z-20"><i class="fas fa-arrow-down"></i></button>
            <!-- Input area -->
            <div class="bg-[#17212b]/80 backdrop-blur-sm p-3 border-t border-white/10">
                <div class="flex items-end gap-2">
                    <button id="attachMediaBtn" class="text-[#2481cc] text-2xl"><i class="fas fa-paperclip"></i></button>
                    <button id="voiceNoteBtn" class="text-[#2481cc] text-2xl"><i class="fas fa-microphone"></i></button>
                    <div class="flex-1 bg-[#242f3e] rounded-2xl px-4 py-2 min-h-[44px] flex items-center">
                        <textarea id="messageInput" rows="1" placeholder="Message..." class="w-full bg-transparent outline-none resize-none text-white max-h-32"></textarea>
                    </div>
                    <button id="sendMessageBtn" class="bg-[#2481cc] rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="adminModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-[#17212b] rounded-2xl w-[600px] max-h-[80vh] overflow-y-auto p-5 border border-white/20">
            <div class="flex justify-between items-center border-b border-white/10 pb-2 mb-4"><h2 class="text-xl font-bold">⚡ ADMIN CONTROL HUB</h2><button id="closeAdminModal" class="text-gray-400"><i class="fas fa-times"></i></button></div>
            <div class="space-y-5">
                <div><h3 class="font-semibold text-[#2481cc]">📢 Broadcast Global Message</h3><textarea id="broadcastMsg" rows="2" class="w-full bg-[#0e1621] rounded-lg p-2 mt-1"></textarea><button id="sendBroadcastBtn" class="mt-2 bg-[#2481cc] px-4 py-1 rounded-full text-sm">Send to all users</button></div>
                <div><h3 class="font-semibold text-[#2481cc]">🖼️ Media Logs Gallery (Cloudinary)</h3><button id="refreshMediaGalleryBtn" class="bg-gray-700 px-3 py-1 rounded-full text-sm">Refresh</button><div id="mediaGalleryList" class="grid grid-cols-3 gap-2 mt-2 max-h-48 overflow-y-auto"></div></div>
                <div><h3 class="font-semibold text-[#2481cc]">🔨 Ban User by UID</h3><input id="banUidInput" placeholder="User UID" class="bg-[#0e1621] rounded-lg p-2 w-full"><button id="banUserBtn" class="mt-2 bg-red-600 px-4 py-1 rounded-full text-sm">Ban User</button></div>
                <div><h3 class="font-semibold text-[#2481cc]">📊 Registered Users</h3><div id="adminUserList" class="text-sm space-y-1 max-h-32 overflow-y-auto"></div></div>
            </div>
        </div>
    </div>

    <div id="newChatModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center"><div class="bg-[#17212b] rounded-2xl w-[400px] p-5"><h2 class="text-xl font-bold mb-3">New Chat</h2><input id="searchUserInput" placeholder="Enter email or username" class="w-full bg-[#0e1621] rounded-lg p-2"><div id="userSearchResults" class="mt-3 max-h-60 overflow-y-auto"></div><button id="closeNewChatModal" class="mt-4 w-full bg-gray-700 py-2 rounded-full">Cancel</button></div></div>

    <!-- Custom Context Menu -->
    <div id="contextMenu" class="fixed hidden bg-[#1e2a36] rounded-lg shadow-xl border border-white/20 z-[100] w-48 py-1 text-sm"></div>

    <!-- Firebase & App Modules -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
    <script>
        // Register Service Worker for PWA
        if('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(console.log); }
    </script>
</body>
</html>
