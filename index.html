<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecto - تواصل مع العالم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Tahoma', sans-serif; }
        .chat-container { height: 60vh; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: white; }
        .message-sent { background: #0088cc; color: white; padding: 8px 12px; border-radius: 10px; margin: 5px; text-align: right; max-width: 70%; }
        .message-received { background: #e5e5ea; color: black; padding: 8px 12px; border-radius: 10px; margin: 5px; text-align: left; max-width: 70%; }
        .login-form { max-width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .stories-bar { display: flex; overflow-x: auto; padding: 10px; background: white; border-radius: 10px; margin-bottom: 20px; }
        .story { min-width: 80px; margin: 0 5px; text-align: center; }
        .story img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #0088cc; }
        .call-btn { background: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 5px; margin: 5px; }
        .voice-message { background: #dc3545; color: white; padding: 8px 12px; border-radius: 10px; margin: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; max-width: 500px; width: 100%; }
        @media (max-width: 768px) {
            .chat-container { height: 50vh; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- شاشة تسجيل الدخول -->
        <div id="loginScreen" class="login-form">
            <h3 class="text-center mb-4">Connecto</h3>
            <p class="text-center mb-4">تواصل مع العالم</p>
            <div class="mb-3">
                <input type="email" id="loginEmail" class="form-control" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="mb-3">
                <input type="password" id="loginPassword" class="form-control" placeholder="كلمة المرور" required>
            </div>
            <button id="loginBtn" class="btn btn-primary w-100">دخول</button>
            <p class="text-center mt-3">ليس لديك حساب؟ <a href="#" id="showRegister">سجل الآن</a></p>
        </div>

        <!-- شاشة التسجيل -->
        <div id="registerScreen" class="login-form" style="display: none;">
            <h3 class="text-center mb-4">إنشاء حساب</h3>
            <div class="mb-3">
                <input type="text" id="registerName" class="form-control" placeholder="اسم المستخدم" required>
            </div>
            <div class="mb-3">
                <input type="email" id="registerEmail" class="form-control" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="mb-3">
                <input type="password" id="registerPassword" class="form-control" placeholder="كلمة المرور" required>
            </div>
            <button id="registerBtn" class="btn btn-success w-100">سجل الآن</button>
            <p class="text-center mt-3">لديك حساب بالفعل؟ <a href="#" id="showLogin">سجل دخول</a></p>
        </div>

        <!-- شاشة الدردشة -->
        <div id="chatScreen" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>مرحباً، <span id="userName"></span>!</h4>
                <button id="logoutBtn" class="btn btn-danger">خروج</button>
            </div>

            <!-- شريط القصص -->
            <div class="stories-bar">
                <div class="story" id="addStory">
                    <img src="https://via.placeholder.com/60" alt="إضافة قصة">
                    <p>إضافة</p>
                </div>
                <div id="storiesList"></div>
            </div>

            <!-- نافذة الدردشة -->
            <div class="chat-container mb-3" id="chatMessages"></div>

            <!-- أدوات الدردشة -->
            <div class="input-group">
                <input type="text" id="messageInput" class="form-control" placeholder="اكتب رسالتك...">
                <button id="sendMessageBtn" class="btn btn-primary">إرسال</button>
                <button id="recordVoiceBtn" class="btn btn-danger">🎤</button>
                <input type="file" id="fileInput" style="display: none;">
                <button id="attachFileBtn" class="btn btn-secondary">مرفق</button>
                <button id="callBtn" class="btn call-btn">مكالمة صوتية</button>
                <button id="videoCallBtn" class="btn call-btn">مكالمة مرئية</button>
            </div>
        </div>
    </div>

    <!-- نافذة تسجيل الصوت -->
    <div id="voiceModal" class="modal">
        <div class="modal-content">
            <h4>تسجيل صوت</h4>
            <button id="startRecording" class="btn btn-danger">ابدأ التسجيل</button>
            <button id="stopRecording" class="btn btn-secondary" disabled>وقف التسجيل</button>
            <button id="cancelRecording" class="btn btn-secondary">إلغاء</button>
            <audio id="voicePreview" controls style="width: 100%; margin-top: 10px; display: none;"></audio>
        </div>
    </div>

    <!-- نافذة المكالمات -->
    <div id="callModal" class="modal">
        <div class="modal-content">
            <h4 id="callModalTitle">مكالمة...</h4>
            <video id="localVideo" autoplay muted style="width: 200px; border-radius: 10px;"></video>
            <video id="remoteVideo" autoplay style="width: 200px; border-radius: 10px;"></video>
            <div>
                <button id="endCallBtn" class="btn btn-danger">إنهاء المكالمة</button>
            </div>
        </div>
    </div>

    <!-- نافذة مشاهدة القصة -->
    <div id="storyModal" class="modal">
        <div class="modal-content" style="background: black; padding: 0;">
            <img id="storyImage" src="" style="width: 100%;">
            <div style="position: absolute; bottom: 10px; left: 10px; color: white;">
                <p id="storyUserName"></p>
            </div>
            <button id="closeStoryBtn" class="btn btn-secondary" style="position: absolute; top: 10px; right: 10px;">إغلاق</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
