<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TELGRAMI | منصة تواصل ذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0088cc;
            --primary-dark: #006699;
            --primary-light: #e3f2fd;
            --primary-gold: #ffd700;
            --secondary: #2c3e50;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #1a1a2e;
            --gray: #f5f7fa;
            --gray-dark: #e9ecef;
            --text: #2c3e50;
            --text-light: #6c757d;
            --white: #ffffff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --border-radius: 16px;
            --border-radius-sm: 12px;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBg 60s linear infinite;
        }

        @keyframes moveBg {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }

        /* App Container */
        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--white);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 350px;
            background: var(--white);
            border-left: 1px solid var(--gray-dark);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .sidebar-header h3 i {
            margin-left: 8px;
            color: var(--primary-gold);
        }

        .menu-btn, .admin-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }

        .menu-btn:hover, .admin-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .search-box {
            padding: 15px;
            background: var(--gray);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 30px;
            outline: none;
            background: var(--white);
            box-shadow: var(--shadow-sm);
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        /* Navigation Tabs */
        .main-nav {
            display: flex;
            background: var(--white);
            border-bottom: 1px solid var(--gray-dark);
            padding: 5px;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-light);
            transition: all 0.3s;
            border-radius: var(--border-radius-sm);
            font-weight: 500;
        }

        .nav-tab i {
            font-size: 18px;
        }

        .nav-tab.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .nav-tab:hover:not(.active) {
            background: var(--gray);
        }

        .main-view {
            flex: 1;
            overflow-y: auto;
        }

        .main-view.hidden {
            display: none;
        }

        /* Chat List */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--gray-dark);
        }

        .chat-item:hover {
            background: var(--gray);
        }

        .chat-item.active {
            background: var(--primary-light);
            border-right: 4px solid var(--primary);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 12px;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-light);
            margin-right: 10px;
            flex-shrink: 0;
        }

        .new-chat-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            font-size: 22px;
            z-index: 10;
        }

        .new-chat-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,136,204,0.4);
        }

        /* ========== CHAT AREA ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--gray);
        }

        .chat-header {
            padding: 15px 20px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-dark);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 18px;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-light);
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-date {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin: 15px 0;
            position: relative;
        }

        .message-date span {
            background: var(--gray-dark);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .received {
            align-self: flex-start;
            background: var(--white);
            border-bottom-left-radius: 5px;
            box-shadow: var(--shadow-sm);
        }

        .sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
            text-align: left;
            display: inline-block;
            margin-right: 8px;
        }

        .message-seen {
            font-size: 12px;
            display: inline-block;
        }

        .message-edited {
            font-size: 10px;
            margin-right: 5px;
            opacity: 0.7;
        }

        .message-image {
            max-width: 250px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-image:hover {
            transform: scale(1.02);
        }

        .message-video {
            max-width: 250px;
            border-radius: 12px;
        }

        .message-file {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
        }

        .typing-indicator {
            padding: 8px 20px;
            font-size: 12px;
            color: var(--text-light);
            display: none;
            align-items: center;
            gap: 5px;
        }

        .typing-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Message Input */
        .message-input-area {
            padding: 15px 20px;
            background: var(--white);
            border-top: 1px solid var(--gray-dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attach-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 22px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .attach-btn:hover {
            background: var(--gray);
        }

        .message-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid var(--gray-dark);
            border-radius: 25px;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .message-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* ========== STORIES ========== */
        .stories-container {
            display: flex;
            overflow-x: auto;
            padding: 20px;
            gap: 20px;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .story-item:hover {
            transform: translateY(-5px);
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 8px;
            border: 3px solid var(--primary);
        }

        .story-item.viewed .story-avatar {
            border-color: var(--gray-dark);
            filter: grayscale(0.5);
        }

        .my-story .story-avatar {
            background: linear-gradient(45deg, var(--gray-dark), #ccc);
            border-color: var(--gray-dark);
        }

        .story-name {
            font-size: 12px;
            text-align: center;
            font-weight: 500;
        }

        /* Story Viewer */
        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .story-viewer-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-progress-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .story-progress-bar {
            height: 3px;
            background: rgba(255,255,255,0.4);
            flex: 1;
            border-radius: 3px;
            overflow: hidden;
        }

        .story-progress-bar::after {
            content: '';
            display: block;
            height: 100%;
            width: 0;
            background: white;
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .story-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-content img,
        .story-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .story-text {
            color: white;
            font-size: 28px;
            text-align: center;
            padding: 30px;
            max-width: 80%;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
        }

        .story-nav {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
        }

        .story-prev, .story-next {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-prev:hover, .story-next:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.1);
        }

        .story-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 20;
        }

        /* Story Modal */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            backdrop-filter: blur(5px);
        }

        .story-modal-content {
            background: var(--white);
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .story-modal-content h3 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .story-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .story-type-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--gray-dark);
            background: var(--white);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-type-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .story-text-input {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid var(--gray-dark);
            border-radius: 16px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }

        .story-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .story-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .story-submit {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .story-cancel {
            background: var(--gray);
            color: var(--text);
        }

        /* ========== AUTH ========== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        .auth-box {
            background: var(--white);
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            width: 400px;
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        .auth-logo {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 25px;
        }

        .auth-logo i {
            background: none;
            -webkit-text-fill-color: var(--primary);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            gap: 10px;
            background: var(--gray);
            padding: 5px;
            border-radius: 50px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--gray-dark);
            border-radius: 30px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .form-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .form-button:disabled {
            opacity: 0.6;
            transform: none;
        }

        .error-message {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        .success-message {
            color: var(--success);
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        /* ========== ADMIN PANEL ========== */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .admin-content {
            background: var(--white);
            padding: 30px;
            border-radius: 28px;
            width: 85%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--gray-dark);
        }

        .admin-header h3 {
            color: var(--primary);
            font-size: 24px;
        }

        .admin-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary-light), white);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-card i {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .stat-card span {
            font-size: 32px;
            font-weight: 800;
            display: block;
            color: var(--primary);
        }

        .stat-card label {
            color: var(--text-light);
            font-size: 14px;
        }

        .admin-section {
            margin-top: 25px;
        }

        .admin-section h5 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--secondary);
        }

        .admin-user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--gray-dark);
        }

        .admin-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .admin-btn.danger {
            background: var(--danger);
            color: white;
        }

        .admin-btn.primary {
            background: var(--primary);
            color: white;
        }

        /* ========== CALL UI ========== */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .call-modal-content {
            background: var(--white);
            border-radius: 32px;
            padding: 35px;
            text-align: center;
            min-width: 300px;
        }

        .caller-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin: 0 auto 20px;
        }

        .caller-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .call-type {
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .call-actions {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .call-decline, .call-answer {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .call-decline {
            background: var(--danger);
            color: white;
        }

        .call-answer {
            background: var(--success);
            color: white;
        }

        .call-decline:hover, .call-answer:hover {
            transform: scale(1.1);
        }

        .call-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 2000;
        }

        .call-ui-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 140px;
            height: 180px;
            border-radius: 16px;
            object-fit: cover;
            z-index: 10;
            border: 3px solid var(--primary);
            box-shadow: var(--shadow);
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .call-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            z-index: 20;
        }

        .call-control {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            font-size: 26px;
            cursor: pointer;
            background: rgba(0,0,0,0.7);
            color: white;
            transition: all 0.2s;
        }

        .call-control:hover {
            transform: scale(1.1);
        }

        .call-control.call-end {
            background: var(--danger);
        }

        /* ========== IMAGE MODAL ========== */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2500;
            cursor: pointer;
        }

        .image-modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .image-modal-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 16px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .app-container {
                border-radius: 0;
            }
            
            .sidebar {
                width: 100%;
                position: absolute;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                height: 100%;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .chat-area {
                width: 100%;
            }

            .chat-area.hidden-mobile {
                display: none;
            }

            .auth-box {
                width: 90%;
                margin: 20px;
                padding: 30px 20px;
            }

            .message {
                max-width: 85%;
            }

            .story-avatar {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Auth Container -->
    <div class="auth-container" id="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="fas fa-comment-dots"></i> TELGRAMI
            </div>
            <div class="auth-tabs">
                <div class="auth-tab active" id="login-tab">تسجيل الدخول</div>
                <div class="auth-tab" id="register-tab">إنشاء حساب</div>
            </div>
            <div id="login-form">
                <div class="form-group">
                    <input type="email" id="login-email" class="form-input" placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" class="form-input" placeholder="كلمة المرور">
                </div>
                <button class="form-button" id="login-button">دخول</button>
                <div id="login-error" class="error-message"></div>
            </div>
            <div id="register-form" style="display: none;">
                <div class="form-group">
                    <input type="text" id="register-name" class="form-input" placeholder="اسم المستخدم">
                </div>
                <div class="form-group">
                    <input type="email" id="register-email" class="form-input" placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" class="form-input" placeholder="كلمة المرور">
                </div>
                <div class="form-group">
                    <input type="password" id="register-confirm-password" class="form-input" placeholder="تأكيد كلمة المرور">
                </div>
                <button class="form-button" id="register-button">إنشاء حساب</button>
                <div id="register-error" class="error-message"></div>
                <div id="register-success" class="success-message"></div>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div class="app-container" id="app-container" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="menu-btn" id="menu-button">
                    <i class="fas fa-bars"></i>
                </button>
                <h3><i class="fas fa-comment-dots"></i> TELGRAMI</h3>
                <button class="admin-btn" id="admin-button">
                    <i class="fas fa-crown"></i>
                </button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="بحث في المحادثات..." id="search-input">
            </div>
            <div class="main-nav">
                <button class="nav-tab active" data-tab="chats">
                    <i class="fas fa-comments"></i>
                    <span>المحادثات</span>
                </button>
                <button class="nav-tab" data-tab="stories">
                    <i class="fas fa-layer-group"></i>
                    <span>القصص</span>
                </button>
                <button class="nav-tab" data-tab="calls">
                    <i class="fas fa-phone-alt"></i>
                    <span>المكالمات</span>
                </button>
            </div>
            <div id="chats-view" class="main-view">
                <div class="chat-list" id="chats-list">
                    <div class="empty-state">
                        <i class="fas fa-comment-slash"></i>
                        <p>لا توجد محادثات بعد</p>
                    </div>
                </div>
            </div>
            <div id="stories-view" class="main-view hidden">
                <div class="stories-container" id="stories-container"></div>
            </div>
            <div id="calls-view" class="main-view hidden">
                <div class="calls-list" id="calls-list">
                    <div class="empty-state">
                        <i class="fas fa-phone-slash"></i>
                        <p>لا توجد مكالمات سابقة</p>
                    </div>
                </div>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chat-area">
            <div class="chat-header">
                <div class="chat-header-avatar" id="chat-header-avatar">T</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chat-header-name">الدردشة العامة</div>
                    <div class="chat-header-status" id="chat-header-status">متصل</div>
                </div>
            </div>
            <div class="messages-container" id="messages-container"></div>
            <div class="typing-indicator" id="typing-indicator"></div>
            <div class="message-input-area">
                <button class="attach-btn" id="attach-btn">
                    <i class="fas fa-paperclip"></i>
                </button>
                <textarea class="message-input" id="message-input" placeholder="اكتب رسالة..." rows="1"></textarea>
                <button class="send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="admin-panel" style="display: none;">
            <div class="admin-content">
                <div class="admin-header">
                    <h3><i class="fas fa-crown"></i> لوحة التحكم</h3>
                    <button class="admin-close" id="admin-close">&times;</button>
                </div>
                <div id="admin-content-area"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
