<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LahaChat | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0088cc;
            --primary-dark: #0077b6;
            --secondary: #f5f5f5;
            --text-primary: #171717;
            --text-secondary: #6c757d;
            --border-color: #e9ecef;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--secondary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .auth-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .auth-tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            outline: none;
            text-align: right;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .form-button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .form-button:hover {
            background-color: var(--primary-dark);
        }

        .error-message {
            color: var(--danger);
            font-size: 14px;
            margin-top: 5px;
            text-align: right;
        }

        .success-message {
            color: var(--success);
            font-size: 14px;
            margin-top: 5px;
            text-align: right;
        }

        .admin-badge {
            background-color: var(--warning);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 5px;
        }

        @media (max-width: 768px) {
            .auth-box {
                width: 90%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container" id="auth-container">
        <div class="auth-box">
            <h2>LahaChat</h2>
            <p>مرحبًا بك في منصة الدردشة</p>

            <div class="auth-tabs">
                <div class="auth-tab active" id="login-tab">تسجيل الدخول</div>
                <div class="auth-tab" id="register-tab">إنشاء حساب</div>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <div id="login-form">
                <div class="form-group">
                    <input type="email" id="login-email" class="form-input" placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" class="form-input" placeholder="كلمة المرور">
                </div>
                <div class="form-group">
                    <button class="form-button" id="login-button">دخول</button>
                </div>
                <div id="login-error" class="error-message"></div>
            </div>

            <!-- نموذج إنشاء حساب -->
            <div id="register-form" style="display: none;">
                <div class="form-group">
                    <input type="text" id="register-name" class="form-input" placeholder="اسم المستخدم">
                </div>
                <div class="form-group">
                    <input type="email" id="register-email" class="form-input" placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" class="form-input" placeholder="كلمة المرور">
                </div>
                <div class="form-group">
                    <input type="password" id="register-confirm-password" class="form-input" placeholder="تأكيد كلمة المرور">
                </div>
                <div class="form-group">
                    <button class="form-button" id="register-button">إنشاء حساب</button>
                </div>
                <div id="register-error" class="error-message"></div>
                <div id="register-success" class="success-message"></div>
            </div>
        </div>
    </div>

    <!-- واجهة الدردشة -->
    <div class="container" id="chat-container" style="display: none;">
        <div id="admin-panel" style="display: none;">
            <!-- لوحة تحكم المشرف -->
            <h2>لوحة تحكم المشرف <span class="admin-badge">Admin</span></h2>
            <div style="margin-bottom: 20px;">
                <button id="manage-users-btn" class="form-button" style="margin-bottom: 10px;">إدارة المستخدمين</button>
                <button id="manage-chats-btn" class="form-button" style="margin-bottom: 10px;">إدارة الدردشات</button>
                <button id="cloudinary-btn" class="form-button" style="margin-bottom: 10px;">إدارة الملفات (Cloudinary)</button>
                <button id="logout-btn" class="form-button" style="background-color: var(--danger);">تسجيل الخروج</button>
            </div>
            <div id="admin-content"></div>
        </div>

        <div id="regular-chat">
            <!-- واجهة الدردشة العادية -->
            <h2>مرحبًا في LahaChat</h2>
            <div id="chat-interface">
                <!-- سيتم إضافة واجهة الدردشة هنا -->
                <p>هذه هي واجهة الدردشة العادية. سيتم تطويرها أكثر في النسخة النهائية.</p>
            </div>
        </div>
    </div>

    <!-- تضمين ملفات JavaScript -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
