name: تشغيل Scraper وإنشاء ملفات فيتا

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 تحميل الكود من المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ تشغيل scraper.py لإنشاء جميع الملفات
        run: python scraper.py

      - name: 📋 عرض الملفات المنشأة للتأكيد
        run: |
          echo "===== محتويات مجلد VitaProject ====="
          ls -la VitaProject/
          echo ""
          echo "===== محتويات .github ====="
          ls -la .github/workflows/

      - name: 🚀 رفع الملفات المنشأة إلى المستودع
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VitaProject/
          git diff --cached --quiet || git commit -m "🤖 إنشاء ملفات فيتا تلقائيًا [Automated]"
          git push
