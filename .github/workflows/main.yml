name: نشر فيتا على GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: 📄 إعداد الصفحات
        uses: actions/configure-pages@v4

      - name: 📦 رفع الموقع
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 النشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
